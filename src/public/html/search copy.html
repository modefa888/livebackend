<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视搜索</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        /* 侧边栏 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1499;
            display: none;
        }
        .sidebar-overlay.active {
            display: block;
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            z-index: 1500;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active {
            right: 0;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 {
            font-size: 1.3rem;
            color: #333;
        }
        .sidebar-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            padding: 5px;
            transition: color 0.2s;
        }
        .sidebar-close:hover {
            color: #333;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: #ccc #f1f1f1;
        }
        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-content::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        .favorite-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            background: #f8f9fa;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .favorite-item:hover {
            background: #e9ecef;
            transform: translateX(-3px);
        }
        .favorite-item-img {
            width: 80px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            background: #ddd;
            flex-shrink: 0;
        }
        .favorite-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .favorite-item-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .favorite-item-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .favorite-item-tag {
            font-size: 12px;
            padding: 3px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
        }
        .favorite-item-actions {
            display: flex;
            gap: 8px;
        }
        .favorite-item-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .favorite-item-delete:hover {
            background: #ff3838;
        }
        .empty-favorites {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-favorites .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }
        .load-more.spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .load-more-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
        }
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .search-box.sticky {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            max-width: 700px;
            width: calc(100% - 40px);
            padding: 12px 18px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.25), 0 2px 8px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .search-box.sticky input {
            padding: 10px 14px;
            font-size: 15px;
        }
        .search-box.sticky button {
            padding: 10px 24px;
            font-size: 15px;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        .stats {
            text-align: center;
            color: white;
            margin: 20px 0;
            font-size: 14px;
        }
        .settings-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 3001;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
        }
        .log-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3001;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        .log-toggle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            position: relative;
        }
        .log-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .log-toggle-btn.has-new {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .log-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .settings-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }
        /* 设置菜单 */
        .settings-menu {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            min-width: 180px;
            display: none;
            overflow: hidden;
            animation: slideIn 0.2s ease-out;
        }
        .settings-menu.active {
            display: block;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .settings-menu-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: #333;
        }
        .settings-menu-item:hover {
            background: #f5f5f5;
        }

        .log-container {
            background: #1a1a2e;
            color: #eee;
            border-radius: 12px;
            max-height: 320px;
            max-width: 380px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 3000;
            overflow: hidden;
        }
        .log-header {
            padding: 10px 15px 8px;
            border-bottom: 1px solid #333;
            background: #1a1a2e;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .log-content {
            padding: 5px 15px 10px;
            max-height: 260px;
            overflow-y: auto;
        }
        .log-container.active {
            display: block;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .log-success {
            color: #4ade80;
        }
        .log-error {
            color: #f87171;
        }
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .view-toggle button {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .view-toggle button.active {
            background: white;
            color: #667eea;
            border-color: white;
        }
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .card-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 48px;
        }
        .card-content {
            padding: 15px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-year {
            color: #666;
            font-size: 14px;
        }
        .card-source {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .card-type {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .table-view {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        .table tbody tr:hover {
            background: #f8f9fa;
            cursor: pointer;
        }
        .thumbnail {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag-source {
            background: #e0e7ff;
            color: #667eea;
        }
        .tag-type {
            background: #dbeafe;
            color: #2563eb;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            margin-top: 30px;
            margin-bottom: 30px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            margin: 0;
        }
        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }
        .modal-body {
            padding: 25px;
        }
        .movie-info {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
        }
        .movie-poster {
            width: 200px;
            height: 280px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .movie-details {
            flex: 1;
        }
        .movie-details h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 12px;
        }
        .detail-label {
            width: 80px;
            color: #888;
            font-weight: 500;
        }
        .detail-value {
            color: #333;
        }
        .movie-desc {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            line-height: 1.8;
            color: #555;
        }
        .episodes {
            margin-top: 25px;
        }
        .episodes h4 {
            margin-bottom: 15px;
            color: #333;
        }
        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .episode-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .episode-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .favorite-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }
        .favorite-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        .favorite-btn.favorited {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .favorite-btn.favorited:hover {
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }
        .player-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            max-height: 600px;  // 固定容器最大高度
            width: 100%;
        }
        .player-container.active {
            display: block;
        }
        .player-container video {
            width: 100%;
            height: 100%;
            max-height: 600px;
            display: block;
            background: #000;
            object-fit: contain;  // 保持视频比例，完整显示在容器内
            object-position: center;  // 视频居中显示
        }
        .player-loading {
            position: relative;
            height: 500px;  // 给加载状态一个固定高度
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-loading::before {
            content: '正在加载视频...';
            color: white;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .empty-state h3 {
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .movie-info {
                flex-direction: column;
            }
            .movie-poster {
                width: 100%;
                height: auto;
                max-height: 400px;
            }
            .search-box {
                flex-direction: column;
            }
            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
        
        /* Toast 消息样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        
        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
            animation: toastSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 280px;
            max-width: 400px;
        }
        
        .toast.toast-success {
            border-left: 4px solid #10b981;
        }
        
        .toast.toast-error {
            border-left: 4px solid #ef4444;
        }
        
        .toast.toast-warning {
            border-left: 4px solid #f59e0b;
        }
        
        .toast.toast-info {
            border-left: 4px solid #3b82f6;
        }
        
        .toast-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .toast-content {
            flex: 1;
        }
        
        .toast-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 2px;
            font-size: 14px;
        }
        
        .toast-message {
            color: #6b7280;
            font-size: 13px;
            line-height: 1.5;
        }
        
        .toast-close {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        
        .toast-close:hover {
            color: #4b5563;
        }
        
        .toast.hiding {
            animation: toastSlideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        
        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateX(100px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        
        @keyframes toastSlideOut {
            from {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateX(100px) scale(0.95);
            }
        }
        
        /* 进一步美化界面 */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }
        
        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);

        .search-box {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.95);

        .search-box input {
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .search-box button {
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            transition: all 0.3s;
        }
        
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .card {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);

        .card-image {
            border-radius: 16px 16px 0 0;
        }
        
        .modal-content {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);

        .modal-header {
            padding: 24px;

        .modal-body {
            padding: 32px;
        }
        
        .settings-btn, .log-toggle-btn {

            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);

        .settings-btn:hover, .log-toggle-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 影视搜索</h1>
            <p>汇聚全网影视资源，快速搜索你想看的内容</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入关键词搜索..." onkeypress="if(event.key==='Enter')doSearch()">
            <button id="searchBtn" onclick="doSearch()">搜索</button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <span id="statsText"></span>
        </div>

        <!-- 左侧设置面板 -->
        <div class="settings-panel">
            <button class="settings-btn" onclick="toggleSettingsMenu()">⚙️</button>
            <div class="settings-menu" id="settingsMenu">
                <div class="settings-menu-item" onclick="openFavorites(); toggleSettingsMenu();">
                    ❤️ 我的收藏
                </div>
            </div>
        </div>
        
        <!-- 右侧日志面板 -->
        <div class="log-panel">
            <button class="log-toggle-btn" id="logToggleBtn" onclick="toggleLogPanel()">
                📋
                <span class="log-badge" id="logBadge" style="display: none;">0</span>
            </button>
        </div>
        
        <!-- 日志面板 -->
        <div class="log-container" id="logContainer">
            <div class="log-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: bold;">🔍 搜索日志</span>
                <button onclick="closeLog()" style="background: none; border: none; color: #888; cursor: pointer; font-size: 18px; padding: 0 5px;">×</button>
            </div>
            <div class="log-content" id="logContent"></div>
        </div>

        <div class="view-toggle" id="viewToggle" style="display: none;">
            <button class="active" onclick="setView('grid')">📱 卡片视图</button>
            <button onclick="setView('table')">📋 列表视图</button>
        </div>

        <div id="resultsGrid" class="grid-view" style="display: none;"></div>
        <div id="resultsTable" style="display: none;"></div>
        <div id="pagination" class="pagination" style="display: none;"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="playerContainer" class="player-container">
                    <video id="videoPlayer" controls></video>
                </div>
                <div id="movieInfo"></div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- 收藏侧边栏 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="handleSidebarOverlayClick()"></div>
    <div class="sidebar" id="favoritesSidebar">
        <div class="sidebar-header">
            <h2>❤️ 我的收藏</h2>
            <button class="sidebar-close" onclick="closeSidebar()">×</button>
        </div>
        <div class="sidebar-content" id="favoritesContent">
            <!-- 收藏列表将在这里显示 -->
        </div>
    </div>

    <script>
        // Toast 消息系统
        function showToast(type, title, message, duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.classList.add('hiding'); setTimeout(() => this.parentElement.remove(), 300);">×</button>
            `;
            
            container.appendChild(toast);
            
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.add('hiding');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
            
            return toast;
        }
        
        // 快捷方法
        function toastSuccess(title, message) {
            return showToast('success', title, message);
        }
        
        function toastError(title, message) {
            return showToast('error', title, message);
        }
        
        function toastWarning(title, message) {
            return showToast('warning', title, message);
        }
        
        function toastInfo(title, message) {
            return showToast('info', title, message);
        }
        
        let allResults = [];
        let currentView = 'grid';
        let currentPage = 1; // 本地显示页码
        let currentApiPage = 1; // API当前已加载的最大页码
        let currentKeyword = ''; // 保存当前搜索关键词
        const pageSize = 20;
        let eventSource = null;
        let isSearching = false;
        let favoritesList = [];
        let favoritesPage = 1;
        let favoritesHasMore = true;
        let favoritesLoading = false;
        let logCount = 0;
        let isLogPanelOpen = false;

        const API_BASE = window.location.protocol + '//' + window.location.host;
        
        // 从URL参数获取token并保存到localStorage
        function initTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (token) {
                localStorage.setItem('token', token);
                // 从URL中移除token参数，避免暴露
                const url = new URL(window.location.href);
                url.searchParams.delete('token');
                window.history.replaceState({}, '', url.toString());
            }
        }
        
        // 初始化token
        initTokenFromUrl();
        
        // 通用的fetch包装，自动添加Authorization头
        function authFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            console.log('authFetch - URL:', url);
            console.log('authFetch - Token存在:', !!token);
            if (token) {
                if (!options.headers) {
                    options.headers = {};
                }
                options.headers['Authorization'] = `Bearer ${token}`;
                // 禁用缓存
                options.headers['Cache-Control'] = 'no-cache, no-store, must-revalidate';
                options.headers['Pragma'] = 'no-cache';
                options.headers['Expires'] = '0';
            }
            return fetch(url, options);
        }

        function addLog(message, type = 'info') {
                const container = document.getElementById('logContainer');
                const content = document.getElementById('logContent');
                const toggleBtn = document.getElementById('logToggleBtn');
                const badge = document.getElementById('logBadge');
                
                // 显示按钮
                toggleBtn.style.display = 'flex';
                
                // 添加新日志
                const item = document.createElement('div');
                item.className = 'log-item' + (type === 'success' ? ' log-success' : type === 'error' ? ' log-error' : '');
                const time = new Date().toLocaleTimeString();
                item.textContent = `[${time}] ${message}`;
                content.appendChild(item);
                
                // 滚动到底部
                container.scrollTop = container.scrollHeight;
                
                // 更新计数器
                logCount++;
                badge.textContent = logCount;
                badge.style.display = 'flex';
                
                // 如果面板没打开，添加脉冲动画
                if (!isLogPanelOpen) {
                    toggleBtn.classList.add('has-new');
                }
            }

            function toggleLogPanel() {
                const container = document.getElementById('logContainer');
                const toggleBtn = document.getElementById('logToggleBtn');
                const badge = document.getElementById('logBadge');
                const logPanel = document.querySelector('.log-panel');
                
                isLogPanelOpen = !isLogPanelOpen;
                
                if (isLogPanelOpen) {
                    container.classList.add('active');
                    toggleBtn.classList.remove('has-new');
                    badge.style.display = 'none';
                    logCount = 0;
                    // 隐藏日志按钮
                    logPanel.style.display = 'none';
                } else {
                    container.classList.remove('active');
                    // 显示日志按钮
                    logPanel.style.display = 'flex';
                }
            }

            function closeLog() {
                const container = document.getElementById('logContainer');
                const logPanel = document.querySelector('.log-panel');
                isLogPanelOpen = false;
                container.classList.remove('active');
                logPanel.style.display = 'flex';
            }

        function doSearch(pg = 1, append = false) {
            if (isSearching) return;
            
            // 如果是第一页且不追加，从输入框获取关键词，否则使用保存的关键词
            const keyword = (pg === 1 && !append) ? document.getElementById('searchInput').value.trim() : currentKeyword;
            if (!keyword) {
                toastWarning('提示', '请输入搜索关键词');
                return;
            }

            isSearching = true;
            
            if (!append) {
                allResults = []; // 不追加模式清空数据
                currentPage = 1;
                currentApiPage = 1;
                currentKeyword = keyword; // 保存关键词
            }
            
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('searchBtn').textContent = append ? '加载中...' : '搜索中...';
            
            // 如果是加载更多模式，设置加载更多按钮的加载状态
            if (append) {
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (loadMoreBtn) {
                    loadMoreBtn.disabled = true;
                    loadMoreBtn.innerHTML = `
                        <span style="display: inline-block; animation: spin 1s linear infinite; margin-right: 5px;">⏳</span>
                        加载中...
                    `;
                }
            }
            
            if (!append) {
                document.getElementById('logContent').innerHTML = '';
                document.getElementById('stats').style.display = 'none';
                document.getElementById('viewToggle').style.display = 'none';
                
                // 重置日志状态
                logCount = 0;
                const badge = document.getElementById('logBadge');
                badge.textContent = '0';
                badge.style.display = 'none';
                document.getElementById('logToggleBtn').classList.remove('has-new');
                document.getElementById('resultsGrid').style.display = 'none';
                document.getElementById('resultsTable').style.display = 'none';
                document.getElementById('pagination').style.display = 'none';
            }

            addLog(append ? `加载第 ${pg} 页: ` + keyword : `开始搜索第 ${pg} 页: ` + keyword, 'info');

            const url = `${API_BASE}/api/vod-aggregated/search/aggregate/stream/public?keyword=${encodeURIComponent(keyword)}&pg=${pg}`;
            
            eventSource = new EventSource(url);
            let searchEnded = false;

            eventSource.onopen = () => {
                addLog('连接成功，正在搜索...', 'info');
            };

            eventSource.addEventListener('data', (event) => {
                const data = JSON.parse(event.data);
                
                // 去重逻辑 - 根据标题和年份判断
                const uniqueResults = data.list.filter(newItem => {
                    const newTitle = (newItem.title || '').toLowerCase().trim();
                    const newYear = newItem.year || '';
                    
                    // 检查是否已存在
                    const isDuplicate = allResults.some(existingItem => {
                        const existingTitle = (existingItem.title || '').toLowerCase().trim();
                        const existingYear = existingItem.year || '';
                        
                        // 标题相同且年份相同视为同一视频
                        return newTitle === existingTitle && newYear === existingYear;
                    });
                    
                    return !isDuplicate;
                });
                
                const removedCount = data.list.length - uniqueResults.length;
                const actualCount = uniqueResults.length;
                
                // 显示数据源结果，包含去重信息
                if (removedCount > 0) {
                    addLog(`✅ ${data.source} 返回 ${data.count} 个结果 | 🔍 去重 ${removedCount} 个 | 新增 ${actualCount} 个`, 'success');
                } else {
                    addLog(`✅ ${data.source} 返回 ${data.count} 个结果 | 新增 ${actualCount} 个`, 'success');
                }
                
                allResults = allResults.concat(uniqueResults);
                renderResults();
            });

            eventSource.addEventListener('error', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addLog(`❌ ${data.source || ''} ${data.message || '搜索错误'}`, 'error');
                } catch (e) {
                    // 忽略解析错误，可能不是自定义的error事件
                }
            });

            eventSource.addEventListener('end', (event) => {
                searchEnded = true;
                const data = JSON.parse(event.data);
                let endMessage = `搜索完成，共找到 ${data.total} 个结果`;
                if (data.successSources !== undefined) {
                    endMessage += `，成功 ${data.successSources} 个源`;
                }
                if (data.failedSources !== undefined) {
                    endMessage += `，失败 ${data.failedSources} 个源`;
                }
                if (data.searchedSources !== undefined) {
                    endMessage += `，总计 ${data.searchedSources} 个源`;
                }
                
                addLog(endMessage, 'success');
                document.getElementById('stats').style.display = 'block';
                let statsText = `已找到 ${allResults.length} 个结果（第${currentApiPage}页）`;
                if (data.successSources !== undefined && data.searchedSources !== undefined) {
                    statsText += `，${data.successSources}/${data.searchedSources} 个源成功`;
                }
                document.getElementById('statsText').textContent = statsText;
                
                // 更新API已加载的最大页码
                if (currentApiPage < pg) {
                    currentApiPage = pg;
                }
                
                isSearching = false;
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('searchBtn').textContent = '搜索';
                eventSource.close();
                
                // 恢复加载更多按钮状态
                const loadMoreBtn = document.getElementById('loadMoreBtn');
                if (loadMoreBtn) {
                    loadMoreBtn.disabled = false;
                    loadMoreBtn.innerHTML = `
                        加载更多 (API第${currentApiPage + 1}页)
                    `;
                }
                
                if (allResults.length > 0) {
                    document.getElementById('viewToggle').style.display = 'flex';
                }
            });

            eventSource.onerror = (err) => {
                console.error('EventSource error:', err);
                
                // 如果搜索已经结束，忽略错误
                if (searchEnded) {
                    return;
                }
                
                addLog('连接波动，继续搜索中...', 'info');
                
                // 不关闭连接，让后端继续发送其他源的数据
                // 由后端的end事件来结束整个搜索过程
            };
        }

        function setView(view) {
            currentView = view;
            // 更新主视图切换按钮
            const viewButtons = document.querySelectorAll('.view-toggle button');
            viewButtons.forEach(btn => btn.classList.remove('active'));
            viewButtons[view === 'grid' ? 0 : 1].classList.add('active');
            renderResults();
        }

        function renderResults() {
            if (allResults.length === 0) return;

            const totalPages = Math.ceil(allResults.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageResults = allResults.slice(startIndex, endIndex);

            if (currentView === 'grid') {
                document.getElementById('resultsGrid').style.display = 'grid';
                document.getElementById('resultsTable').style.display = 'none';
                renderGridView(pageResults, startIndex);
            } else {
                document.getElementById('resultsGrid').style.display = 'none';
                document.getElementById('resultsTable').style.display = 'block';
                renderTableView(pageResults, startIndex);
            }

            renderPagination(totalPages);
        }

        function renderGridView(results, startIndex) {
            const container = document.getElementById('resultsGrid');
            container.innerHTML = results.map((item, index) => `
                <div class="card" onclick="showDetail(${startIndex + index})">
                    ${item.pic 
                        ? `<img class="card-image" src="${item.pic}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                           <div class="card-image" style="display:none;">🎬</div>`
                        : `<div class="card-image">🎬</div>`
                    }
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">
                            <span class="card-year">${item.year || '未知'}</span>
                            <span class="card-source">${item.sourceName}</span>
                        </div>
                        ${item.type ? `<span class="card-type">${item.type}</span>` : ''}
                        <div class="card-desc">${item.desc || '暂无简介'}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderTableView(results, startIndex) {
            const container = document.getElementById('resultsTable');
            container.innerHTML = `
                <div class="table-view">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">封面</th>
                                <th>标题</th>
                                <th style="width: 80px;">年份</th>
                                <th style="width: 100px;">类型</th>
                                <th style="width: 120px;">来源</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${results.map((item, index) => `
                                <tr onclick="showDetail(${startIndex + index})">
                                    <td>
                                        ${item.pic 
                                            ? `<img class="thumbnail" src="${item.pic}" alt="${item.title}">`
                                            : `<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🎬</div>`
                                        }
                                    </td>
                                    <td style="max-width: 300px;">${item.title}</td>
                                    <td>${item.year || '-'}</td>
                                    <td>${item.type ? `<span class="tag tag-type">${item.type}</span>` : '-'}</td>
                                    <td><span class="tag tag-source">${item.sourceName}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            container.style.display = 'flex';
            
            let html = `
                <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span style="padding: 8px;">...</span>`;
                }
            }
            
            // 恢复原来的下一页按钮
            html += `
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;
            
            // 添加加载下一页API的按钮
            html += `
                <button id="loadMoreBtn" onclick="loadNextApiPage()" style="margin-left: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    加载更多 (API第${currentApiPage + 1}页)
                </button>
            `;
            
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > Math.ceil(allResults.length / pageSize)) return;
            currentPage = page;
            renderResults();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function loadNextApiPage() {
            doSearch(currentApiPage + 1, true);
        }

        function showDetail(index) {
            const item = allResults[index];
            if (!item) return;

            console.log('显示详情，item 数据:', item);
            console.log('episodes:', item.episodes);

            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('playerContainer').classList.remove('active');
            
            // 保存当前视频的海报
            currentPoster = item.pic || '';

            // 按播放源分组显示
            let episodesHtml = '';
            if (item.episodes && item.episodes.length > 0) {
                // 按 source 分组
                const sourceGroups = {};
                item.episodes.forEach(ep => {
                    const source = ep.source || '默认';
                    if (!sourceGroups[source]) {
                        sourceGroups[source] = [];
                    }
                    sourceGroups[source].push(ep);
                });

                episodesHtml = Object.keys(sourceGroups).map(sourceName => {
                    const eps = sourceGroups[sourceName];
                    return `
                        <div class="episodes">
                            <h4>📺 ${sourceName} (${eps.length})</h4>
                            <div class="episode-grid">
                                ${eps.map((ep, i) => `
                                    <button class="episode-btn" onclick="playVideo('${ep.url.replace(/'/g, "\\'")}', '${ep.name.replace(/'/g, "\\'")}')">${ep.name}</button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                // 如果没有 episodes，显示一个默认播放按钮
                episodesHtml = `
                    <div class="episodes">
                        <h4>📺 播放</h4>
                        <div class="episode-grid">
                            <button class="episode-btn" onclick="alert('暂无播放链接，数据解析可能有问题，请检查控制台日志')">播放</button>
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 14px;">
                            <strong>提示:</strong> 未找到播放链接，请查看浏览器控制台了解数据详情
                        </div>
                    </div>
                `;
            }

            // 构建详情信息
            let detailsHtml = '';
            if (item.year) detailsHtml += `<div class="detail-row"><span class="detail-label">年份</span><span class="detail-value">${item.year}</span></div>`;
            if (item.type) detailsHtml += `<div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">${item.type}</span></div>`;
            if (item.area) detailsHtml += `<div class="detail-row"><span class="detail-label">地区</span><span class="detail-value">${item.area}</span></div>`;
            if (item.lang) detailsHtml += `<div class="detail-row"><span class="detail-label">语言</span><span class="detail-value">${item.lang}</span></div>`;
            if (item.actor) detailsHtml += `<div class="detail-row"><span class="detail-label">演员</span><span class="detail-value">${item.actor}</span></div>`;
            if (item.director) detailsHtml += `<div class="detail-row"><span class="detail-label">导演</span><span class="detail-value">${item.director}</span></div>`;
            if (item.remarks) detailsHtml += `<div class="detail-row"><span class="detail-label">备注</span><span class="detail-value">${item.remarks}</span></div>`;
            if (item.pubdate) detailsHtml += `<div class="detail-row"><span class="detail-label">首播</span><span class="detail-value">${item.pubdate}</span></div>`;
            detailsHtml += `<div class="detail-row"><span class="detail-label">来源</span><span class="detail-value">${item.sourceName}</span></div>`;

            // 重置收藏状态
            isFavorited = false;
            
            // 检查是否已收藏
            checkFavorite(item.id);
            
            document.getElementById('movieInfo').innerHTML = `
                <div class="movie-info">
                    ${item.pic
                        ? `<img class="movie-poster" src="${item.pic}" alt="${item.title}">`
                        : `<div class="movie-poster" style="display:flex;align-items:center;justify-content:center;font-size:80px;background:#f0f0f0;">🎬</div>`
                    }
                    <div class="movie-details">
                        <h3>${item.title}</h3>
                        ${detailsHtml}
                        <button id="favoriteBtn" class="favorite-btn" onclick="toggleFavorite(allResults[${index}])">
                            🤍 收藏
                        </button>
                    </div>
                </div>
                ${item.desc ? `
                    <div class="movie-desc">
                        <strong>简介</strong>
                        <p>${item.desc}</p>
                    </div>
                ` : ''}
                ${episodesHtml}
            `;

            document.getElementById('modal').classList.add('active');
        }

        let hlsPlayer = null;
        let currentPoster = '';  // 保存当前视频的海报

        function playVideo(url, name) {
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // 先停止之前的播放
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            videoPlayer.pause();
            videoPlayer.src = '';
            
            playerContainer.classList.add('active');
            playerContainer.classList.add('player-loading');
            videoPlayer.poster = currentPoster;  // 设置视频海报
            
            console.log('开始播放:', name, url);
            console.log('使用海报:', currentPoster);
            
            // 判断是否是m3u8
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    // 使用HLS.js
                    hlsPlayer = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,  // 关闭低延迟模式，提高稳定性
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                        startLevel: 0
                    });
                    
                    hlsPlayer.loadSource(url);
                    hlsPlayer.attachMedia(videoPlayer);
                    
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                        console.log('HLS 清单解析成功，开始播放');
                        playerContainer.classList.remove('player-loading');
                        videoPlayer.play().catch(e => {
                            console.log('自动播放失败，请手动点击播放');
                        });
                    });
                    
                    hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                        console.error('HLS 错误:', data);
                        
                        if (data.fatal) {
                            playerContainer.classList.remove('player-loading');
                            let errorMsg = '视频加载失败';
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    errorMsg = `网络错误: ${data.details || '加载失败'}\n\nURL: ${url}`;
                                    console.log('尝试恢复网络错误...');
                                    hlsPlayer.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    errorMsg = `媒体错误: ${data.details || '解码失败'}`;
                                    console.log('尝试恢复媒体错误...');
                                    hlsPlayer.recoverMediaError();
                                    break;
                                default:
                                    errorMsg = `未知错误: ${data.details}`;
                                    hlsPlayer.destroy();
                                    hlsPlayer = null;
                                    break;
                            }
                            toastError('播放失败', errorMsg + '\n建议尝试其他播放源或稍后再试。');
                        }
                    });
                } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari原生支持
                    console.log('使用Safari原生HLS支持');
                    videoPlayer.src = url;
                    
                    // 添加加载和错误处理
                    videoPlayer.oncanplay = () => {
                        playerContainer.classList.remove('player-loading');
                    };
                    videoPlayer.onerror = () => {
                        playerContainer.classList.remove('player-loading');
                        toastError('加载失败', '视频加载失败，请检查网络连接或尝试其他播放源。');
                    };
                    
                    videoPlayer.play().catch(e => console.log('自动播放失败'));
                } else {
                    playerContainer.classList.remove('player-loading');
                    toastError('不支持', '您的浏览器不支持HLS视频播放，建议使用Chrome、Firefox或Safari浏览器。');
                }
            } else {
                // 普通视频
                console.log('播放普通视频');
                videoPlayer.src = url;
                
                // 添加加载和错误处理
                videoPlayer.oncanplay = () => {
                    playerContainer.classList.remove('player-loading');
                };
                videoPlayer.onerror = () => {
                    playerContainer.classList.remove('player-loading');
                    toastError('加载失败', '视频加载失败: ' + (videoPlayer.error?.message || '未知错误'));
                };
                
                videoPlayer.play().catch(e => console.log('自动播放失败，请手动点击播放'));
            }
            
            playerContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // 清理HLS播放器
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            videoPlayer.pause();
            videoPlayer.src = '';
            playerContainer.classList.remove('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            closePlayer();
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });

        // 收藏功能相关
        let isFavorited = false;
        
        async function checkFavorite(vodId) {
            try {
                console.log('checkFavorite - 开始检查, vodId:', vodId);
                console.log('checkFavorite - localStorage中的token:', !!localStorage.getItem('token'));
                
                // 添加时间戳防止缓存
                const url = `${API_BASE}/api/favorites/check/${vodId}?t=${Date.now()}`;
                const response = await authFetch(url);
                console.log('checkFavorite - 响应状态:', response.status);
                
                const data = await response.json();
                console.log('checkFavorite - 响应数据:', data);
                isFavorited = data.isFavorited;
                updateFavoriteBtn();
            } catch (e) {
                console.log('检查收藏状态失败:', e);
            }
        }
        
        async function toggleFavorite(item) {
            try {
                if (isFavorited) {
                    // 取消收藏
                    const response = await authFetch(`${API_BASE}/api/favorites/${item.id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        isFavorited = false;
                        toastSuccess('成功', '已取消收藏');
                    } else if (response.status === 401) {
                        const data = await response.json();
                        toastWarning('提示', data.error || '请先登录后再操作');
                    } else {
                        const data = await response.json();
                        toastError('失败', data.error || '操作失败');
                    }
                } else {
                    // 添加收藏 - 把当前搜索数据转换为收藏格式
                    const favoriteData = {
                        vod_id: item.id,
                        vod_name: item.title,
                        vod_year: item.year,
                        vod_type: item.type,
                        vod_content: item.desc,
                        vod_pic: item.pic,
                        vod_pic_thumb: item.picThumb,
                        vod_pic_slide: item.picSlide,
                        vod_actor: item.actor,
                        vod_director: item.director,
                        vod_remarks: item.remarks,
                        vod_area: item.area,
                        vod_lang: item.lang,
                        vod_pubdate: item.pubdate,
                        vod_play_from: item.playFrom,
                        source_name: item.sourceName,
                        source_id: item.sourceId,
                        episodes: item.episodes
                    };
                    
                    console.log('发送收藏数据:', favoriteData);
                    console.log('episodes:', favoriteData.episodes);
                    
                    const response = await authFetch(`${API_BASE}/api/favorites`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(favoriteData)
                    });
                    
                    if (response.ok) {
                        isFavorited = true;
                        toastSuccess('成功', '收藏成功！');
                    } else if (response.status === 401) {
                        const data = await response.json();
                        toastWarning('提示', data.error || '请先登录后再收藏');
                    } else {
                        const data = await response.json();
                        toastError('失败', data.error || '收藏失败');
                    }
                }
                updateFavoriteBtn();
            } catch (e) {
                console.error('操作失败:', e);
                toastError('失败', '操作失败，请稍后再试');
            }
        }
        
        function updateFavoriteBtn() {
            const btn = document.getElementById('favoriteBtn');
            if (btn) {
                btn.classList.toggle('favorited', isFavorited);
                btn.innerHTML = isFavorited ? '❤️ 已收藏' : '🤍 收藏';
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // 设置菜单功能
        function toggleSettingsMenu() {
            const menu = document.getElementById('settingsMenu');
            menu.classList.toggle('active');
        }

        // 点击其他地方关闭菜单
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('settingsMenu');
            const btn = document.querySelector('.settings-btn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        // 侧边栏功能
        function openFavorites() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('favoritesSidebar').classList.add('active');
            setupFavoritesScrollListener();
            loadFavorites();
        }

        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('favoritesSidebar').classList.remove('active');
        }

        // 处理侧边栏覆盖层点击
        function handleSidebarOverlayClick() {
            // 如果详情模态框是打开的，不关闭侧边栏
            const modal = document.getElementById('modal');
            if (modal && modal.classList.contains('active')) {
                return;
            }
            // 否则关闭侧边栏
            closeSidebar();
        }

        // 加载收藏列表
        async function loadFavorites(append = false) {
            if (favoritesLoading) return;
            if (!append) {
                favoritesPage = 1;
                favoritesHasMore = true;
                favoritesList = [];
            }
            if (!favoritesHasMore && append) return;
            
            favoritesLoading = true;
            const container = document.getElementById('favoritesContent');
            
            if (!append) {
                container.innerHTML = '<div class="load-more spinner"><div class="load-more-spinner"></div> 加载中...</div>';
            } else {
                const loadMoreDiv = document.createElement('div');
                loadMoreDiv.className = 'load-more spinner';
                loadMoreDiv.id = 'loadingMore';
                loadMoreDiv.innerHTML = '<div class="load-more-spinner"></div> 加载中...';
                container.appendChild(loadMoreDiv);
            }
            
            try {
                const response = await authFetch(`${API_BASE}/api/favorites?page=${favoritesPage}&pageSize=20&t=${Date.now()}`);
                
                // 移除加载中提示
                const loadingEl = document.getElementById('loadingMore');
                if (loadingEl) loadingEl.remove();
                
                if (!response.ok) {
                    if (response.status === 401) {
                        container.innerHTML = `
                            <div class="empty-favorites">
                                <div class="icon">🔐</div>
                                <p>请先登录后查看收藏</p>
                            </div>
                        `;
                        return;
                    }
                    throw new Error('获取收藏失败');
                }
                
                const data = await response.json();
                const newItems = data.list || [];
                
                if (!append) {
                    favoritesList = newItems;
                } else {
                    favoritesList = favoritesList.concat(newItems);
                }
                
                favoritesHasMore = data.hasMore;
                favoritesPage++;
                
                if (favoritesList.length === 0) {
                    container.innerHTML = `
                        <div class="empty-favorites">
                            <div class="icon">💔</div>
                            <p>暂无收藏</p>
                            <p style="font-size: 13px; margin-top: 8px;">快去搜索并收藏喜欢的内容吧！</p>
                        </div>
                    `;
                    return;
                }
                
                const renderItems = append ? newItems : favoritesList;
                const html = renderItems.map(item => `
                    <div class="favorite-item" onclick="openFavoriteDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        ${item.vod_pic ? `
                            <img class="favorite-item-img" src="${item.vod_pic}" alt="${item.vod_name}" loading="lazy">
                        ` : `
                            <div class="favorite-item-img">🎬</div>
                        `}
                        <div class="favorite-item-info">
                            <div class="favorite-item-title">${item.vod_name || '未知标题'}</div>
                            <div class="favorite-item-meta">
                                ${item.vod_year ? `<span class="favorite-item-tag">${item.vod_year}</span>` : ''}
                                ${item.vod_type ? `<span class="favorite-item-tag">${item.vod_type}</span>` : ''}
                                ${item.source_name ? `<span class="favorite-item-tag" style="background: #2ed573;">${item.source_name}</span>` : ''}
                            </div>
                            <div class="favorite-item-actions">
                                <button class="favorite-item-delete" onclick="event.stopPropagation(); deleteFavorite('${item.vod_id}', this)">
                                    删除
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                if (!append) {
                    container.innerHTML = html;
                } else {
                    container.insertAdjacentHTML('beforeend', html);
                }
                
                // 添加加载更多提示
                if (favoritesHasMore) {
                    const loadMoreDiv = document.createElement('div');
                    loadMoreDiv.className = 'load-more';
                    loadMoreDiv.id = 'loadMoreTip';
                    loadMoreDiv.textContent = '上滑加载更多...';
                    container.appendChild(loadMoreDiv);
                }
                
            } catch (e) {
                console.error('加载收藏失败:', e);
                const loadingEl = document.getElementById('loadingMore');
                if (loadingEl) loadingEl.remove();
                
                if (!append) {
                    container.innerHTML = `
                        <div class="empty-favorites">
                            <div class="icon">❌</div>
                            <p>加载失败</p>
                            <p style="font-size: 13px; margin-top: 8px;">请稍后重试</p>
                        </div>
                    `;
                }
            } finally {
                favoritesLoading = false;
            }
        }
        
        // 侧边栏滚动监听
        let scrollListenerAdded = false;
        function setupFavoritesScrollListener() {
            if (scrollListenerAdded) return;
            
            const content = document.getElementById('favoritesContent');
            content.addEventListener('scroll', () => {
                const scrollTop = content.scrollTop;
                const scrollHeight = content.scrollHeight;
                const clientHeight = content.clientHeight;
                
                // 距离底部 100px 时加载更多
                if (scrollTop + clientHeight >= scrollHeight - 100) {
                    loadFavorites(true);
                }
            });
            scrollListenerAdded = true;
        }

        // 打开收藏详情
        function openFavoriteDetail(item) {
            console.log('打开收藏详情, item:', item);
            console.log('vod_episodes:', item.vod_episodes, '类型:', typeof item.vod_episodes);
            
            // 不关闭侧边栏，让用户可以继续查看其他收藏
            // 转换收藏数据格式为搜索结果格式
            
            let episodes = [];
            if (item.vod_episodes) {
                if (typeof item.vod_episodes === 'string') {
                    try {
                        episodes = JSON.parse(item.vod_episodes);
                    } catch (e) {
                        console.log('解析 episodes 失败:', e);
                        episodes = [];
                    }
                } else if (Array.isArray(item.vod_episodes)) {
                    episodes = item.vod_episodes;
                } else if (typeof item.vod_episodes === 'object') {
                    episodes = item.vod_episodes;
                }
            }
            
            const searchItem = {
                id: item.vod_id,
                title: item.vod_name,
                year: item.vod_year,
                type: item.vod_type,
                desc: item.vod_content,
                pic: item.vod_pic,
                picThumb: item.vod_pic_thumb,
                picSlide: item.vod_pic_slide,
                actor: item.vod_actor,
                director: item.vod_director,
                remarks: item.vod_remarks,
                area: item.vod_area,
                lang: item.vod_lang,
                pubdate: item.vod_pubdate,
                playFrom: item.vod_play_from,
                sourceName: item.source_name,
                sourceId: item.source_id,
                episodes: episodes
            };
            
            console.log('转换后的 searchItem:', searchItem);
            console.log('episodes:', searchItem.episodes);
            
            // 将当前项添加到搜索结果中，以便详情页能找到
            allResults = [searchItem, ...allResults];
            showDetail(0);
        }

        // 删除收藏
        async function deleteFavorite(vodId, btn) {
            if (!confirm('确定要删除这个收藏吗？')) return;
            
            try {
                const response = await authFetch(`${API_BASE}/api/favorites/${vodId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    // 不从服务器刷新列表，只从本地移除
                    const item = btn.closest('.favorite-item');
                    item.style.opacity = '0';
                    item.style.transform = 'translateX(100%)';
                    setTimeout(() => {
                        item.remove();
                        // 检查是否还有收藏
                        const remaining = document.querySelectorAll('.favorite-item').length;
                        if (remaining === 0) {
                            document.getElementById('favoritesContent').innerHTML = `
                                <div class="empty-favorites">
                                    <div class="icon">💔</div>
                                    <p>暂无收藏</p>
                                    <p style="font-size: 13px; margin-top: 8px;">快去搜索并收藏喜欢的内容吧！</p>
                                </div>
                            `;
                        }
                    }, 300);
                } else if (response.status === 401) {
                    const data = await response.json();
                    toastWarning('提示', data.error || '请先登录后再操作');
                } else {
                    toastError('失败', '删除失败');
                }
            } catch (e) {
                console.error('删除收藏失败:', e);
                toastError('失败', '删除失败，请稍后重试');
            }
        }
        
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            const settingsPanel = document.querySelector('.settings-panel');
            const logPanel = document.querySelector('.log-panel');
            settingsPanel.style.display = 'flex';
            logPanel.style.display = 'flex';
            
            // 搜索框悬浮监听
            const searchBox = document.querySelector('.search-box');
            const searchBoxOriginalTop = searchBox.offsetTop + 200; // 下滑200px后悬浮
            
            window.addEventListener('scroll', function() {
                if (window.scrollY > searchBoxOriginalTop) {
                    searchBox.classList.add('sticky');
                } else {
                    searchBox.classList.remove('sticky');
                }
            });
        });
    </script>
