<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .game-container {
            position: relative;
        }
        
        #game-board {
            border: 2px solid #333;
            background-color: #000;
            display: block;
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .score, .level {
            color: #333;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            z-index: 10;
        }
        
        .game-over h2 {
            margin-bottom: 10px;
        }
        
        .game-over p {
            margin-bottom: 20px;
        }
        
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #45a049;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        .controls p {
            margin-bottom: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>贪吃蛇游戏</h1>
    <div class="game-container">
        <canvas id="game-board" width="400" height="400"></canvas>
        <div class="game-over" id="game-over" style="display: none;">
            <h2>游戏结束！</h2>
            <p>得分: <span id="final-score">0</span></p>
            <button class="btn" onclick="startGame()">重新开始</button>
        </div>
    </div>
    <div class="game-info">
        <div class="score">得分: <span id="score">0</span></div>
        <div class="level">等级: <span id="level">1</span></div>
    </div>
    <div class="controls">
        <p>使用方向键控制蛇的移动</p>
        <p>吃到食物得分，撞到墙壁或自己游戏结束</p>
    </div>

    <script>
        // 游戏参数
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const canvasSize = 400;
        const gridCount = canvasSize / gridSize;
        
        // 游戏状态
        let snake = [{ x: 10, y: 10 }];
        let food = generateFood();
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let level = 1;
        let gameSpeed = 150;
        let gameInterval;
        let gameOver = false;
        
        // 生成食物
        function generateFood() {
            let foodPosition;
            do {
                foodPosition = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (snake.some(segment => segment.x === foodPosition.x && segment.y === foodPosition.y));
            return foodPosition;
        }
        
        // 绘制游戏
        function drawGame() {
            // 清空画布
            ctx.clearRect(0, 0, canvasSize, canvasSize);
            
            // 绘制蛇
            ctx.fillStyle = '#4CAF50';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            // 绘制食物
            ctx.fillStyle = '#FF5722';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }
        
        // 更新游戏状态
        function updateGame() {
            // 更新方向
            direction = nextDirection;
            
            // 计算新的头部位置
            const head = { ...snake[0] };
            switch (direction) {
                case 'up':
                    head.y--;
                    break;
                case 'down':
                    head.y++;
                    break;
                case 'left':
                    head.x--;
                    break;
                case 'right':
                    head.x++;
                    break;
            }
            
            // 检查碰撞
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                endGame();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }
            
            // 添加新头部
            snake.unshift(head);
            
            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').textContent = score;
                
                // 每5分升级
                if (score % 5 === 0) {
                    level++;
                    gameSpeed = Math.max(50, gameSpeed - 10);
                    document.getElementById('level').textContent = level;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(gameLoop, gameSpeed);
                }
                
                food = generateFood();
            } else {
                // 移除尾部
                snake.pop();
            }
        }
        
        // 游戏循环
        function gameLoop() {
            updateGame();
            drawGame();
        }
        
        // 结束游戏
        function endGame() {
            clearInterval(gameInterval);
            gameOver = true;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }
        
        // 开始游戏
        function startGame() {
            // 重置游戏状态
            snake = [{ x: 10, y: 10 }];
            food = generateFood();
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            level = 1;
            gameSpeed = 150;
            gameOver = false;
            
            // 重置UI
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('game-over').style.display = 'none';
            
            // 开始游戏循环
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
            }
        });
        
        // 开始游戏
        startGame();
    </script>
</body>
</html>
