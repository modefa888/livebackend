<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>影视搜索 - 移动版</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }
        .container {
            min-height: 100vh;
            padding: 15px;
            padding-bottom: 100px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            padding-top: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            margin-bottom: 15px;
        }
        .search-box input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .search-box button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 80px;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .stats {
            text-align: center;
            color: white;
            margin: 15px 0;
            font-size: 14px;
        }
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .view-toggle button {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .view-toggle button.active {
            background: white;
            color: #667eea;
            border-color: white;
        }
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            transition: all 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        }
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 36px;
        }
        .card-content {
            padding: 12px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .card-year {
            color: #666;
            font-size: 12px;
        }
        .card-source {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .card-type {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .table-view {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            font-size: 12px;
        }
        .table tbody tr:hover {
            background: #f8f9fa;
            cursor: pointer;
        }
        .thumbnail {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .tag-source {
            background: #e0e7ff;
            color: #667eea;
        }
        .tag-type {
            background: #dbeafe;
            color: #2563eb;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 10px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            min-width: 45px;
        }
        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            overflow-y: auto;
            padding: 15px;
        }
        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 90%;
            margin-top: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 18px;
        }
        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }
        .modal-body {
            padding: 20px;
        }
        .movie-info {
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        .movie-poster {
            width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .movie-details {
            flex: 1;
        }
        .movie-details h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 20px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .detail-label {
            width: 70px;
            color: #888;
            font-weight: 500;
            flex-shrink: 0;
        }
        .detail-value {
            color: #333;
            flex: 1;
            word-break: break-all;
        }
        .movie-desc {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #555;
            font-size: 14px;
        }
        .episodes {
            margin-top: 20px;
        }
        .episodes h4 {
            margin-bottom: 12px;
            color: #333;
            font-size: 16px;
        }
        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .episode-btn {
            padding: 10px 16px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .episode-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .favorite-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            width: 100%;
            justify-content: center;
        }
        .favorite-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        .favorite-btn.favorited {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .player-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            display: none;
            width: 100%;
        }
        .player-container.active {
            display: block;
        }
        .player-container video {
            width: 100%;
            height: 220px;
            display: block;
            background: #000;
            object-fit: contain;
            object-position: center;
        }
        .player-loading {
            position: relative;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-loading::before {
            content: '正在加载视频...';
            color: white;
            font-size: 16px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: white;
        }
        .empty-state h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        .empty-state p {
            font-size: 14px;
        }
        .load-more {
            text-align: center;
            padding: 15px;
            color: #999;
            font-size: 13px;
        }
        .load-more.spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .load-more-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 15px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
            animation: toastSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 240px;
            max-width: 320px;
        }
        .toast.toast-success {
            border-left: 4px solid #10b981;
        }
        .toast.toast-error {
            border-left: 4px solid #ef4444;
        }
        .toast.toast-warning {
            border-left: 4px solid #f59e0b;
        }
        .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }
        .toast-content {
            flex: 1;
        }
        .toast-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 2px;
            font-size: 13px;
        }
        .toast-message {
            color: #6b7280;
            font-size: 12px;
            line-height: 1.4;
        }
        .toast-close {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
        }
        .toast.hiding {
            animation: toastSlideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateX(100px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toastSlideOut {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(100px) scale(0.95); }
        }
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 15px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .bottom-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 20px;
            border: none;
            background: none;
            cursor: pointer;
            color: #666;
            transition: color 0.2s;
            font-size: 12px;
        }
        .bottom-btn:hover, .bottom-btn.active {
            color: #667eea;
        }
        .bottom-btn span:first-child {
            font-size: 20px;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1499;
            display: none;
        }
        .sidebar-overlay.active {
            display: block;
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 85%;
            max-width: 320px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            z-index: 1500;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.active {
            right: 0;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-header h2 {
            font-size: 1.2rem;
            color: #333;
        }
        .sidebar-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            padding: 5px;
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .favorite-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #f8f9fa;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .favorite-item:hover {
            background: #e9ecef;
        }
        .favorite-item-img {
            width: 65px;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            background: #ddd;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .favorite-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }
        .favorite-item-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 14px;
        }
        .favorite-item-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .favorite-item-tag {
            font-size: 11px;
            padding: 2px 6px;
            background: #667eea;
            color: white;
            border-radius: 3px;
        }
        .favorite-item-actions {
            display: flex;
            gap: 6px;
        }
        .favorite-item-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .empty-favorites {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-favorites .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-favorites button {
            margin-top: 12px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            overflow-y: auto;
            padding: 15px;
        }
        .login-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
        }
        .login-modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .login-modal-header h2 {
            margin: 0;
            font-size: 20px;
        }
        .login-close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-modal-body {
            padding: 25px;
        }
        .login-form-group {
            margin-bottom: 18px;
        }
        .login-form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .login-form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .login-form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .delete-confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 3001;
            padding: 15px;
        }
        .delete-confirm-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-confirm-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 320px;
            overflow: hidden;
        }
        .delete-confirm-header {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .delete-confirm-header h2 {
            margin: 0;
            font-size: 18px;
        }
        .delete-confirm-body {
            padding: 25px;
            text-align: center;
        }
        .delete-confirm-body p {
            margin: 0 0 20px 0;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        #deleteConfirmTitle {
            background: #f1f2f6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            word-break: break-all;
        }
        .delete-confirm-buttons {
            display: flex;
            gap: 10px;
        }
        .delete-confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .delete-confirm-btn.cancel {
            background: #f1f2f6;
            color: #333;
        }
        .delete-confirm-btn.delete {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
        }
        .delete-confirm-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .log-container {
            position: fixed;
            bottom: 80px;
            left: 15px;
            right: 15px;
            background: rgba(26, 26, 46, 0.95);
            color: #eee;
            border-radius: 12px;
            max-height: 200px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 3000;
            overflow: hidden;
        }
        .log-container.active {
            display: block;
        }
        .log-header {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a2e;
        }
        .log-header span {
            font-weight: bold;
            font-size: 13px;
        }
        .log-header button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
        }
        .log-content {
            padding: 8px 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .log-success {
            color: #4ade80;
        }
        .log-error {
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 影视搜索</h1>
            <p>汇聚全网影视资源，快速搜索你想看的内容</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入关键词搜索..." onkeypress="if(event.key==='Enter')doSearch()">
            <button id="searchBtn" onclick="doSearch()">搜索</button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <span id="statsText"></span>
        </div>

        <div class="view-toggle" id="viewToggle" style="display: none;">
            <button class="active" onclick="setView('grid')">📱 卡片</button>
            <button onclick="setView('table')">📋 列表</button>
        </div>

        <div id="resultsGrid" class="grid-view" style="display: none;"></div>
        <div id="resultsTable" style="display: none;"></div>
        <div id="pagination" class="pagination" style="display: none;"></div>
    </div>

    <div class="bottom-bar">
        <button class="bottom-btn" onclick="doSearch()">
            <span>🔍</span>
            <span>搜索</span>
        </button>
        <button class="bottom-btn" onclick="openFavorites()">
            <span>❤️</span>
            <span>收藏</span>
        </button>
        <button class="bottom-btn" onclick="toggleLogPanel()">
            <span>📋</span>
            <span>日志</span>
        </button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="playerContainer" class="player-container">
                    <video id="videoPlayer" controls></video>
                </div>
                <div id="movieInfo"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="favoritesSidebar">
        <div class="sidebar-header">
            <h2>❤️ 我的收藏</h2>
            <button class="sidebar-close" onclick="closeSidebar()">×</button>
        </div>
        <div class="sidebar-content" id="favoritesContent"></div>
    </div>

    <div class="login-modal" id="loginModal">
        <div class="login-modal-content">
            <div class="login-modal-header">
                <h2>🔐 登录</h2>
                <button class="login-close-btn" onclick="closeLoginModal()">×</button>
            </div>
            <div class="login-modal-body">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="login-form-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="login-form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" id="loginBtn" class="login-btn">登录</button>
                </form>
            </div>
        </div>
    </div>

    <div class="delete-confirm-modal" id="deleteConfirmModal">
        <div class="delete-confirm-content">
            <div class="delete-confirm-header">
                <h2>⚠️ 确认删除</h2>
            </div>
            <div class="delete-confirm-body">
                <p>确定要删除以下收藏吗？此操作无法撤销。</p>
                <div id="deleteConfirmTitle"></div>
                <div class="delete-confirm-buttons">
                    <button class="delete-confirm-btn cancel" onclick="closeDeleteConfirmModal()">取消</button>
                    <button class="delete-confirm-btn delete" id="confirmDeleteBtn" onclick="confirmDelete()">删除</button>
                </div>
            </div>
        </div>
    </div>

    <div class="log-container" id="logContainer">
        <div class="log-header">
            <span>🔍 搜索日志</span>
            <button onclick="closeLog()">×</button>
        </div>
        <div class="log-content" id="logContent"></div>
    </div>

    <script>
        function showToast(type, title, message, duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            toast.innerHTML = `
                <span class="toast-icon">${icons[type]}</span>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close" onclick="this.parentElement.classList.add('hiding'); setTimeout(() => this.parentElement.remove(), 300);">×</button>
            `;
            container.appendChild(toast);
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.add('hiding');
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            }
            return toast;
        }
        function toastSuccess(title, message) { return showToast('success', title, message); }
        function toastError(title, message) { return showToast('error', title, message); }
        function toastWarning(title, message) { return showToast('warning', title, message); }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('loginUsername').focus();
        }
        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginForm').reset();
        }
        async function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            if (!username || !password) {
                toastWarning('提示', '请输入用户名和密码');
                return;
            }
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    toastSuccess('成功', '登录成功！');
                    closeLoginModal();
                    if (document.getElementById('favoritesSidebar').classList.contains('active')) {
                        loadFavorites();
                    }
                } else {
                    toastError('失败', data.error || '登录失败');
                }
            } catch (e) {
                toastError('失败', '登录失败，请检查网络连接');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }
        document.getElementById('loginModal').addEventListener('click', (e) => {
            if (e.target.id === 'loginModal') closeLoginModal();
        });

        let deleteTargetVodId = null;
        let deleteTargetElement = null;
        function openDeleteConfirmModal(vodId, title, element) {
            deleteTargetVodId = vodId;
            deleteTargetElement = element;
            document.getElementById('deleteConfirmTitle').textContent = title;
            document.getElementById('deleteConfirmModal').classList.add('active');
        }
        function closeDeleteConfirmModal() {
            document.getElementById('deleteConfirmModal').classList.remove('active');
            deleteTargetVodId = null;
            deleteTargetElement = null;
        }
        async function confirmDelete() {
            if (!deleteTargetVodId || !deleteTargetElement) return;
            const confirmBtn = document.getElementById('confirmDeleteBtn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = '删除中...';
            try {
                const response = await authFetch(`${API_BASE}/api/favorites/${deleteTargetVodId}`, { method: 'DELETE' });
                if (response.ok) {
                    const item = deleteTargetElement.closest('.favorite-item');
                    item.style.opacity = '0';
                    setTimeout(() => {
                        item.remove();
                        const remaining = document.querySelectorAll('.favorite-item').length;
                        if (remaining === 0) {
                            document.getElementById('favoritesContent').innerHTML = `
                                <div class="empty-favorites">
                                    <div class="icon">💔</div>
                                    <p>暂无收藏</p>
                                    <p style="font-size: 12px; margin-top: 6px;">快去搜索并收藏喜欢的内容吧！</p>
                                </div>
                            `;
                        }
                    }, 300);
                    toastSuccess('成功', '已取消收藏');
                    closeDeleteConfirmModal();
                } else if (response.status === 401) {
                    const data = await response.json();
                    toastWarning('提示', data.error || '请先登录后再操作');
                    closeDeleteConfirmModal();
                    openLoginModal();
                } else {
                    toastError('失败', '删除失败');
                }
            } catch (e) {
                toastError('失败', '删除失败，请稍后重试');
            } finally {
                confirmBtn.disabled = false;
                confirmBtn.textContent = '删除';
            }
        }
        document.getElementById('deleteConfirmModal').addEventListener('click', (e) => {
            if (e.target.id === 'deleteConfirmModal') closeDeleteConfirmModal();
        });

        let allResults = [];
        let currentView = 'grid';
        let currentPage = 1;
        let currentApiPage = 1;
        let currentKeyword = '';
        const pageSize = 20;
        let eventSource = null;
        let isSearching = false;
        let favoritesList = [];
        let favoritesPage = 1;
        let favoritesHasMore = true;
        let favoritesLoading = false;
        let isLogPanelOpen = false;

        const API_BASE = window.location.protocol + '//' + window.location.host;

        function initTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (token) {
                localStorage.setItem('token', token);
                const url = new URL(window.location.href);
                url.searchParams.delete('token');
                window.history.replaceState({}, '', url.toString());
            }
        }
        initTokenFromUrl();

        function authFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            if (token) {
                if (!options.headers) options.headers = {};
                options.headers['Authorization'] = `Bearer ${token}`;
                options.headers['Cache-Control'] = 'no-cache, no-store, must-revalidate';
                options.headers['Pragma'] = 'no-cache';
                options.headers['Expires'] = '0';
            }
            return fetch(url, options);
        }

        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const content = document.getElementById('logContent');
            const item = document.createElement('div');
            item.className = 'log-item' + (type === 'success' ? ' log-success' : type === 'error' ? ' log-error' : '');
            const time = new Date().toLocaleTimeString();
            item.textContent = `[${time}] ${message}`;
            content.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function toggleLogPanel() {
            const container = document.getElementById('logContainer');
            isLogPanelOpen = !isLogPanelOpen;
            container.classList.toggle('active', isLogPanelOpen);
        }

        function closeLog() {
            const container = document.getElementById('logContainer');
            isLogPanelOpen = false;
            container.classList.remove('active');
        }

        function doSearch(pg = 1, append = false) {
            if (isSearching) return;
            const keyword = (pg === 1 && !append) ? document.getElementById('searchInput').value.trim() : currentKeyword;
            if (!keyword) {
                toastWarning('提示', '请输入搜索关键词');
                return;
            }
            isSearching = true;
            if (!append) {
                allResults = [];
                currentPage = 1;
                currentApiPage = 1;
                currentKeyword = keyword;
            }
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('searchBtn').textContent = append ? '加载中...' : '搜索中...';

            if (!append) {
                document.getElementById('logContent').innerHTML = '';
                document.getElementById('stats').style.display = 'none';
                document.getElementById('viewToggle').style.display = 'none';
                document.getElementById('resultsGrid').style.display = 'none';
                document.getElementById('resultsTable').style.display = 'none';
                document.getElementById('pagination').style.display = 'none';
            }

            addLog(append ? `加载第 ${pg} 页: ${keyword}` : `开始搜索第 ${pg} 页: ${keyword}`, 'info');

            const url = `${API_BASE}/api/vod-aggregated/search/aggregate/stream/public?keyword=${encodeURIComponent(keyword)}&pg=${pg}`;
            eventSource = new EventSource(url);
            let searchEnded = false;

            eventSource.onopen = () => {
                addLog('连接成功，正在搜索...', 'info');
            };

            eventSource.addEventListener('data', (event) => {
                const data = JSON.parse(event.data);
                const uniqueResults = data.list.filter(newItem => {
                    const newTitle = (newItem.title || '').toLowerCase().trim();
                    const newYear = newItem.year || '';
                    return !allResults.some(existingItem => {
                        const existingTitle = (existingItem.title || '').toLowerCase().trim();
                        const existingYear = existingItem.year || '';
                        return newTitle === existingTitle && newYear === existingYear;
                    });
                });
                const removedCount = data.list.length - uniqueResults.length;
                const actualCount = uniqueResults.length;
                if (removedCount > 0) {
                    addLog(`✅ ${data.source} 返回 ${data.count} 个结果 | 去重 ${removedCount} 个 | 新增 ${actualCount} 个`, 'success');
                } else {
                    addLog(`✅ ${data.source} 返回 ${data.count} 个结果 | 新增 ${actualCount} 个`, 'success');
                }
                allResults = allResults.concat(uniqueResults);
                renderResults();
            });

            eventSource.addEventListener('error', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addLog(`❌ ${data.source || ''} ${data.message || '搜索错误'}`, 'error');
                } catch (e) {}
            });

            eventSource.addEventListener('end', (event) => {
                searchEnded = true;
                const data = JSON.parse(event.data);
                let endMessage = `搜索完成，共找到 ${data.total} 个结果`;
                if (data.successSources !== undefined) endMessage += `，成功 ${data.successSources} 个源`;
                if (data.failedSources !== undefined) endMessage += `，失败 ${data.failedSources} 个源`;
                if (data.searchedSources !== undefined) endMessage += `，总计 ${data.searchedSources} 个源`;
                addLog(endMessage, 'success');
                
                document.getElementById('stats').style.display = 'block';
                let statsText = `已找到 ${allResults.length} 个结果（第${currentApiPage}页）`;
                if (data.successSources !== undefined && data.searchedSources !== undefined) {
                    statsText += `，${data.successSources}/${data.searchedSources} 个源成功`;
                }
                document.getElementById('statsText').textContent = statsText;

                if (currentApiPage < pg) currentApiPage = pg;
                isSearching = false;
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('searchBtn').textContent = '搜索';
                eventSource.close();

                if (allResults.length > 0) {
                    document.getElementById('viewToggle').style.display = 'flex';
                }
            });

            eventSource.onerror = (err) => {
                if (!searchEnded) {
                    addLog('连接波动，继续搜索中...', 'info');
                }
            };
        }

        function setView(view) {
            currentView = view;
            const viewButtons = document.querySelectorAll('.view-toggle button');
            viewButtons.forEach(btn => btn.classList.remove('active'));
            viewButtons[view === 'grid' ? 0 : 1].classList.add('active');
            renderResults();
        }

        function renderResults() {
            if (allResults.length === 0) return;
            const totalPages = Math.ceil(allResults.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageResults = allResults.slice(startIndex, endIndex);

            if (currentView === 'grid') {
                document.getElementById('resultsGrid').style.display = 'grid';
                document.getElementById('resultsTable').style.display = 'none';
                renderGridView(pageResults, startIndex);
            } else {
                document.getElementById('resultsGrid').style.display = 'none';
                document.getElementById('resultsTable').style.display = 'block';
                renderTableView(pageResults, startIndex);
            }
            renderPagination(totalPages);
        }

        function renderGridView(results, startIndex) {
            const container = document.getElementById('resultsGrid');
            container.innerHTML = results.map((item, index) => `
                <div class="card" onclick="showDetail(${startIndex + index})">
                    ${item.pic 
                        ? `<img class="card-image" src="${item.pic}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                           <div class="card-image" style="display:none;">🎬</div>`
                        : `<div class="card-image">🎬</div>`
                    }
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">
                            <span class="card-year">${item.year || '未知'}</span>
                            <span class="card-source">${item.sourceName}</span>
                        </div>
                        ${item.type ? `<span class="card-type">${item.type}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderTableView(results, startIndex) {
            const container = document.getElementById('resultsTable');
            container.innerHTML = `
                <div class="table-view">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">封面</th>
                                <th>标题</th>
                                <th style="width: 60px;">年份</th>
                                <th style="width: 80px;">来源</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${results.map((item, index) => `
                                <tr onclick="showDetail(${startIndex + index})">
                                    <td>
                                        ${item.pic 
                                            ? `<img class="thumbnail" src="${item.pic}" alt="${item.title}">`
                                            : `<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;font-size:20px;">🎬</div>`
                                        }
                                    </td>
                                    <td style="max-width: 150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.title}</td>
                                    <td>${item.year || '-'}</td>
                                    <td><span class="tag tag-source">${item.sourceName}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            container.style.display = 'flex';
            
            let html = `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += `<span style="padding: 8px;">...</span>`;
                }
            }
            
            html += `
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                <button id="loadMoreBtn" onclick="loadNextApiPage()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    加载更多
                </button>
            `;
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > Math.ceil(allResults.length / pageSize)) return;
            currentPage = page;
            renderResults();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadNextApiPage() {
            doSearch(currentApiPage + 1, true);
        }

        let hlsPlayer = null;
        let currentPoster = '';
        let isFavorited = false;

        function showDetail(index) {
            const item = allResults[index];
            if (!item) return;

            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('playerContainer').classList.remove('active');
            currentPoster = item.pic || '';
            isFavorited = false;
            checkFavorite(item.id);

            let episodesHtml = '';
            if (item.episodes && item.episodes.length > 0) {
                const sourceGroups = {};
                item.episodes.forEach(ep => {
                    const source = ep.source || '默认';
                    if (!sourceGroups[source]) sourceGroups[source] = [];
                    sourceGroups[source].push(ep);
                });

                episodesHtml = Object.keys(sourceGroups).map(sourceName => {
                    const eps = sourceGroups[sourceName];
                    return `
                        <div class="episodes">
                            <h4>📺 ${sourceName} (${eps.length})</h4>
                            <div class="episode-grid">
                                ${eps.map((ep, i) => `
                                    <button class="episode-btn" onclick="playVideo('${ep.url.replace(/'/g, "\\'")}', '${ep.name.replace(/'/g, "\\'")}')">${ep.name}</button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                episodesHtml = `
                    <div class="episodes">
                        <h4>📺 播放</h4>
                        <div class="episode-grid">
                            <button class="episode-btn" onclick="alert('暂无播放链接')">播放</button>
                        </div>
                    </div>
                `;
            }

            let detailsHtml = '';
            if (item.year) detailsHtml += `<div class="detail-row"><span class="detail-label">年份</span><span class="detail-value">${item.year}</span></div>`;
            if (item.type) detailsHtml += `<div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">${item.type}</span></div>`;
            if (item.area) detailsHtml += `<div class="detail-row"><span class="detail-label">地区</span><span class="detail-value">${item.area}</span></div>`;
            if (item.lang) detailsHtml += `<div class="detail-row"><span class="detail-label">语言</span><span class="detail-value">${item.lang}</span></div>`;
            if (item.actor) detailsHtml += `<div class="detail-row"><span class="detail-label">演员</span><span class="detail-value">${item.actor}</span></div>`;
            if (item.director) detailsHtml += `<div class="detail-row"><span class="detail-label">导演</span><span class="detail-value">${item.director}</span></div>`;
            detailsHtml += `<div class="detail-row"><span class="detail-label">来源</span><span class="detail-value">${item.sourceName}</span></div>`;

            document.getElementById('movieInfo').innerHTML = `
                <div class="movie-info">
                    ${item.pic
                        ? `<img class="movie-poster" src="${item.pic}" alt="${item.title}">`
                        : `<div class="movie-poster" style="display:flex;align-items:center;justify-content:center;font-size:60px;background:#f0f0f0;">🎬</div>`
                    }
                    <div class="movie-details">
                        <h3>${item.title}</h3>
                        ${detailsHtml}
                        <button id="favoriteBtn" class="favorite-btn" onclick="toggleFavorite(allResults[${index}])">
                            🤍 收藏
                        </button>
                    </div>
                </div>
                ${item.desc ? `<div class="movie-desc"><strong>简介</strong><p>${item.desc}</p></div>` : ''}
                ${episodesHtml}
            `;

            document.getElementById('modal').classList.add('active');
        }

        function playVideo(url, name) {
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');

            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            videoPlayer.pause();
            videoPlayer.src = '';

            playerContainer.classList.add('active');
            playerContainer.classList.add('player-loading');
            videoPlayer.poster = currentPoster;

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls({
                        enableWorker: true,
                        maxBufferLength: 30,
                        startLevel: 0
                    });
                    hlsPlayer.loadSource(url);
                    hlsPlayer.attachMedia(videoPlayer);
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                        playerContainer.classList.remove('player-loading');
                        videoPlayer.play().catch(e => {});
                    });
                    hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                        console.error('HLS Error:', data);
                        if (data.fatal) {
                            playerContainer.classList.remove('player-loading');
                            let errorMsg = '视频加载失败';
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    errorMsg = `网络错误`;
                                    hlsPlayer.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    errorMsg = `媒体错误`;
                                    hlsPlayer.recoverMediaError();
                                    break;
                                default:
                                    errorMsg = `未知错误`;
                                    hlsPlayer.destroy();
                                    hlsPlayer = null;
                                    break;
                            }
                            toastError('播放失败', errorMsg);
                        }
                    });
                } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    videoPlayer.src = url;
                    videoPlayer.oncanplay = () => playerContainer.classList.remove('player-loading');
                    videoPlayer.onerror = () => {
                        playerContainer.classList.remove('player-loading');
                        toastError('加载失败', '视频加载失败');
                    };
                    videoPlayer.play().catch(e => {});
                } else {
                    playerContainer.classList.remove('player-loading');
                    toastError('不支持', '您的浏览器不支持HLS视频播放');
                }
            } else {
                videoPlayer.src = url;
                videoPlayer.oncanplay = () => playerContainer.classList.remove('player-loading');
                videoPlayer.onerror = () => {
                    playerContainer.classList.remove('player-loading');
                    toastError('加载失败', '视频加载失败');
                };
                videoPlayer.play().catch(e => {});
            }
            playerContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            videoPlayer.pause();
            videoPlayer.src = '';
            playerContainer.classList.remove('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            closePlayer();
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        async function checkFavorite(vodId) {
            try {
                const url = `${API_BASE}/api/favorites/check/${vodId}?t=${Date.now()}`;
                const response = await authFetch(url);
                const data = await response.json();
                isFavorited = data.isFavorited;
                updateFavoriteBtn();
            } catch (e) {}
        }

        async function toggleFavorite(item) {
            try {
                if (isFavorited) {
                    const response = await authFetch(`${API_BASE}/api/favorites/${item.id}`, { method: 'DELETE' });
                    if (response.ok) {
                        isFavorited = false;
                        toastSuccess('成功', '已取消收藏');
                    } else if (response.status === 401) {
                        const data = await response.json();
                        toastWarning('提示', data.error || '请先登录');
                        openLoginModal();
                    } else {
                        toastError('失败', '操作失败');
                    }
                } else {
                    const favoriteData = {
                        vod_id: item.id,
                        vod_name: item.title,
                        vod_year: item.year,
                        vod_type: item.type,
                        vod_content: item.desc,
                        vod_pic: item.pic,
                        vod_actor: item.actor,
                        vod_director: item.director,
                        vod_area: item.area,
                        vod_lang: item.lang,
                        source_name: item.sourceName,
                        episodes: item.episodes
                    };
                    const response = await authFetch(`${API_BASE}/api/favorites`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(favoriteData)
                    });
                    if (response.ok) {
                        isFavorited = true;
                        toastSuccess('成功', '收藏成功！');
                    } else if (response.status === 401) {
                        const data = await response.json();
                        toastWarning('提示', data.error || '请先登录后再收藏');
                        openLoginModal();
                    } else {
                        toastError('失败', '收藏失败');
                    }
                }
                updateFavoriteBtn();
            } catch (e) {
                toastError('失败', '操作失败，请稍后再试');
            }
        }

        function updateFavoriteBtn() {
            const btn = document.getElementById('favoriteBtn');
            if (btn) {
                btn.classList.toggle('favorited', isFavorited);
                btn.innerHTML = isFavorited ? '❤️ 已收藏' : '🤍 收藏';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeLoginModal();
                closeDeleteConfirmModal();
            }
        });

        function openFavorites() {
            document.getElementById('sidebarOverlay').classList.add('active');
            document.getElementById('favoritesSidebar').classList.add('active');
            loadFavorites();
        }

        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active');
            document.getElementById('favoritesSidebar').classList.remove('active');
        }

        async function loadFavorites(append = false) {
            if (favoritesLoading) return;
            if (!append) {
                favoritesPage = 1;
                favoritesHasMore = true;
                favoritesList = [];
            }
            if (!favoritesHasMore && append) return;

            favoritesLoading = true;
            const container = document.getElementById('favoritesContent');

            if (!append) {
                container.innerHTML = '<div class="load-more spinner"><div class="load-more-spinner"></div> 加载中...</div>';
            }

            try {
                const response = await authFetch(`${API_BASE}/api/favorites?page=${favoritesPage}&pageSize=20&t=${Date.now()}`);

                if (!response.ok) {
                    if (response.status === 401) {
                        container.innerHTML = `
                            <div class="empty-favorites">
                                <div class="icon">🔐</div>
                                <p>请先登录后查看收藏</p>
                                <button onclick="openLoginModal()">登录</button>
                            </div>
                        `;
                        return;
                    }
                    throw new Error('获取收藏失败');
                }

                const data = await response.json();
                const newItems = data.list || [];

                if (!append) {
                    favoritesList = newItems;
                } else {
                    favoritesList = favoritesList.concat(newItems);
                }

                favoritesHasMore = data.hasMore;
                favoritesPage++;

                if (favoritesList.length === 0) {
                    container.innerHTML = `
                        <div class="empty-favorites">
                            <div class="icon">💔</div>
                            <p>暂无收藏</p>
                            <p style="font-size: 12px; margin-top: 6px;">快去搜索并收藏喜欢的内容吧！</p>
                        </div>
                    `;
                    return;
                }

                const html = favoritesList.map(item => `
                    <div class="favorite-item" onclick="openFavoriteDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        ${item.vod_pic ? `
                            <img class="favorite-item-img" src="${item.vod_pic}" alt="${item.vod_name}" loading="lazy">
                        ` : `
                            <div class="favorite-item-img">🎬</div>
                        `}
                        <div class="favorite-item-info">
                            <div class="favorite-item-title">${item.vod_name || '未知标题'}</div>
                            <div class="favorite-item-meta">
                                ${item.vod_year ? `<span class="favorite-item-tag">${item.vod_year}</span>` : ''}
                                ${item.vod_type ? `<span class="favorite-item-tag">${item.vod_type}</span>` : ''}
                                ${item.source_name ? `<span class="favorite-item-tag" style="background: #2ed573;">${item.source_name}</span>` : ''}
                            </div>
                            <div class="favorite-item-actions">
                                <button class="favorite-item-delete" onclick="event.stopPropagation(); deleteFavorite('${item.vod_id}', '${(item.vod_name || '未知标题').replace(/'/g, "\\'")}', this)">删除</button>
                            </div>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = html;

            } catch (e) {
                console.error('加载收藏失败:', e);
                if (!append) {
                    container.innerHTML = `
                        <div class="empty-favorites">
                            <div class="icon">❌</div>
                            <p>加载失败</p>
                            <p style="font-size: 12px; margin-top: 6px;">请稍后重试</p>
                        </div>
                    `;
                }
            } finally {
                favoritesLoading = false;
            }
        }

        function openFavoriteDetail(item) {
            let episodes = [];
            if (item.vod_episodes) {
                if (typeof item.vod_episodes === 'string') {
                    try {
                        episodes = JSON.parse(item.vod_episodes);
                    } catch (e) {
                        episodes = [];
                    }
                } else if (Array.isArray(item.vod_episodes)) {
                    episodes = item.vod_episodes;
                }
            }

            const searchItem = {
                id: item.vod_id,
                title: item.vod_name,
                year: item.vod_year,
                type: item.vod_type,
                desc: item.vod_content,
                pic: item.vod_pic,
                actor: item.vod_actor,
                director: item.vod_director,
                area: item.vod_area,
                lang: item.vod_lang,
                sourceName: item.source_name,
                episodes: episodes
            };

            allResults = [searchItem, ...allResults];
            showDetail(0);
        }

        function deleteFavorite(vodId, title, btn) {
            openDeleteConfirmModal(vodId, title, btn);
        }
    </script>
