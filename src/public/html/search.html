<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视搜索</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .search-box {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
        }
        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .stats {
            text-align: center;
            color: white;
            margin: 20px 0;
            font-size: 14px;
        }
        .log-container {
            background: #1a1a2e;
            color: #eee;
            padding: 15px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .log-success {
            color: #4ade80;
        }
        .log-error {
            color: #f87171;
        }
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .view-toggle button {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .view-toggle button.active {
            background: white;
            color: #667eea;
            border-color: white;
        }
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .card-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 48px;
        }
        .card-content {
            padding: 15px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-year {
            color: #666;
            font-size: 14px;
        }
        .card-source {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .card-type {
            display: inline-block;
            background: #e0e7ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .table-view {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th, .table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        .table tbody tr:hover {
            background: #f8f9fa;
            cursor: pointer;
        }
        .thumbnail {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag-source {
            background: #e0e7ff;
            color: #667eea;
        }
        .tag-type {
            background: #dbeafe;
            color: #2563eb;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            margin-top: 30px;
            margin-bottom: 30px;
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            margin: 0;
        }
        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.3);
        }
        .modal-body {
            padding: 25px;
        }
        .movie-info {
            display: flex;
            gap: 30px;
            margin-bottom: 25px;
        }
        .movie-poster {
            width: 200px;
            height: 280px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .movie-details {
            flex: 1;
        }
        .movie-details h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .detail-row {
            display: flex;
            margin-bottom: 12px;
        }
        .detail-label {
            width: 80px;
            color: #888;
            font-weight: 500;
        }
        .detail-value {
            color: #333;
        }
        .movie-desc {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            line-height: 1.8;
            color: #555;
        }
        .episodes {
            margin-top: 25px;
        }
        .episodes h4 {
            margin-bottom: 15px;
            color: #333;
        }
        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .episode-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .episode-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .favorite-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }
        .favorite-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        .favorite-btn.favorited {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .favorite-btn.favorited:hover {
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }
        .player-container {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            max-height: 600px;  // 固定容器最大高度
            width: 100%;
        }
        .player-container.active {
            display: block;
        }
        .player-container video {
            width: 100%;
            height: 100%;
            max-height: 600px;
            display: block;
            background: #000;
            object-fit: contain;  // 保持视频比例，完整显示在容器内
            object-position: center;  // 视频居中显示
        }
        .player-loading {
            position: relative;
            height: 500px;  // 给加载状态一个固定高度
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-loading::before {
            content: '正在加载视频...';
            color: white;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }
        .empty-state h3 {
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .movie-info {
                flex-direction: column;
            }
            .movie-poster {
                width: 100%;
                height: auto;
                max-height: 400px;
            }
            .search-box {
                flex-direction: column;
            }
            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 影视搜索</h1>
            <p>汇聚全网影视资源，快速搜索你想看的内容</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入关键词搜索..." onkeypress="if(event.key==='Enter')doSearch()">
            <button id="searchBtn" onclick="doSearch()">搜索</button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <span id="statsText"></span>
        </div>

        <div class="log-container" id="logContainer" style="display: none;"></div>

        <div class="view-toggle" id="viewToggle" style="display: none;">
            <button class="active" onclick="setView('grid')">📱 卡片视图</button>
            <button onclick="setView('table')">📋 列表视图</button>
        </div>

        <div id="resultsGrid" class="grid-view" style="display: none;"></div>
        <div id="resultsTable" style="display: none;"></div>
        <div id="pagination" class="pagination" style="display: none;"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="playerContainer" class="player-container">
                    <video id="videoPlayer" controls></video>
                </div>
                <div id="movieInfo"></div>
            </div>
        </div>
    </div>

    <script>
        let allResults = [];
        let currentView = 'grid';
        let currentPage = 1;
        const pageSize = 20;
        let eventSource = null;
        let isSearching = false;

        const API_BASE = window.location.protocol + '//' + window.location.host;

        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            container.style.display = 'block';
            const item = document.createElement('div');
            item.className = 'log-item' + (type === 'success' ? ' log-success' : type === 'error' ? ' log-error' : '');
            const time = new Date().toLocaleTimeString();
            item.textContent = `[${time}] ${message}`;
            container.appendChild(item);
            container.scrollTop = container.scrollHeight;
        }

        function doSearch() {
            if (isSearching) return;
            
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }

            isSearching = true;
            allResults = [];
            currentPage = 1;
            
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('searchBtn').textContent = '搜索中...';
            document.getElementById('logContainer').innerHTML = '';
            document.getElementById('logContainer').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('viewToggle').style.display = 'none';
            document.getElementById('resultsGrid').style.display = 'none';
            document.getElementById('resultsTable').style.display = 'none';
            document.getElementById('pagination').style.display = 'none';

            addLog('开始搜索: ' + keyword, 'info');

            const url = `${API_BASE}/api/vod-aggregated/search/aggregate/stream/public?keyword=${encodeURIComponent(keyword)}`;
            
            eventSource = new EventSource(url);
            let searchEnded = false;

            eventSource.onopen = () => {
                addLog('连接成功，正在搜索...', 'info');
            };

            eventSource.addEventListener('data', (event) => {
                const data = JSON.parse(event.data);
                addLog(`✅ ${data.source} 返回 ${data.count} 个结果`, 'success');
                allResults = allResults.concat(data.list);
                renderResults();
            });

            eventSource.addEventListener('error', (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addLog(`❌ ${data.source || ''} ${data.message || '搜索错误'}`, 'error');
                } catch (e) {
                    // 忽略解析错误，可能不是自定义的error事件
                }
            });

            eventSource.addEventListener('end', (event) => {
                searchEnded = true;
                const data = JSON.parse(event.data);
                addLog(`搜索完成，共找到 ${data.total} 个结果，已搜索 ${data.searchedSources} 个源`, 'success');
                document.getElementById('stats').style.display = 'block';
                document.getElementById('statsText').textContent = `已找到 ${data.total} 个结果，已搜索 ${data.searchedSources} 个源`;
                
                isSearching = false;
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('searchBtn').textContent = '搜索';
                eventSource.close();
                
                if (allResults.length > 0) {
                    document.getElementById('viewToggle').style.display = 'flex';
                }
            });

            eventSource.onerror = (err) => {
                console.error('EventSource error:', err);
                
                // 如果搜索已经结束，忽略错误
                if (searchEnded) {
                    return;
                }
                
                addLog('连接暂时出错，继续搜索中...', 'info');
                // 不立即关闭，让它尝试自动重连或者继续等待
            };
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-toggle button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-toggle button')[view === 'grid' ? 0 : 1].classList.add('active');
            renderResults();
        }

        function renderResults() {
            if (allResults.length === 0) return;

            const totalPages = Math.ceil(allResults.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageResults = allResults.slice(startIndex, endIndex);

            if (currentView === 'grid') {
                document.getElementById('resultsGrid').style.display = 'grid';
                document.getElementById('resultsTable').style.display = 'none';
                renderGridView(pageResults, startIndex);
            } else {
                document.getElementById('resultsGrid').style.display = 'none';
                document.getElementById('resultsTable').style.display = 'block';
                renderTableView(pageResults, startIndex);
            }

            renderPagination(totalPages);
        }

        function renderGridView(results, startIndex) {
            const container = document.getElementById('resultsGrid');
            container.innerHTML = results.map((item, index) => `
                <div class="card" onclick="showDetail(${startIndex + index})">
                    ${item.pic 
                        ? `<img class="card-image" src="${item.pic}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                           <div class="card-image" style="display:none;">🎬</div>`
                        : `<div class="card-image">🎬</div>`
                    }
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">
                            <span class="card-year">${item.year || '未知'}</span>
                            <span class="card-source">${item.sourceName}</span>
                        </div>
                        ${item.type ? `<span class="card-type">${item.type}</span>` : ''}
                        <div class="card-desc">${item.desc || '暂无简介'}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderTableView(results, startIndex) {
            const container = document.getElementById('resultsTable');
            container.innerHTML = `
                <div class="table-view">
                    <table class="table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">封面</th>
                                <th>标题</th>
                                <th style="width: 80px;">年份</th>
                                <th style="width: 100px;">类型</th>
                                <th style="width: 120px;">来源</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${results.map((item, index) => `
                                <tr onclick="showDetail(${startIndex + index})">
                                    <td>
                                        ${item.pic 
                                            ? `<img class="thumbnail" src="${item.pic}" alt="${item.title}">`
                                            : `<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🎬</div>`
                                        }
                                    </td>
                                    <td style="max-width: 300px;">${item.title}</td>
                                    <td>${item.year || '-'}</td>
                                    <td>${item.type ? `<span class="tag tag-type">${item.type}</span>` : '-'}</td>
                                    <td><span class="tag tag-source">${item.sourceName}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPagination(totalPages) {
            if (totalPages <= 1) return;

            const container = document.getElementById('pagination');
            container.style.display = 'flex';
            
            let html = `
                <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span style="padding: 8px;">...</span>`;
                }
            }
            
            html += `
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;
            
            container.innerHTML = html;
        }

        function goToPage(page) {
            if (page < 1 || page > Math.ceil(allResults.length / pageSize)) return;
            currentPage = page;
            renderResults();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showDetail(index) {
            const item = allResults[index];
            if (!item) return;

            console.log('显示详情，item 数据:', item);
            console.log('episodes:', item.episodes);

            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('playerContainer').classList.remove('active');
            
            // 保存当前视频的海报
            currentPoster = item.pic || '';

            // 按播放源分组显示
            let episodesHtml = '';
            if (item.episodes && item.episodes.length > 0) {
                // 按 source 分组
                const sourceGroups = {};
                item.episodes.forEach(ep => {
                    const source = ep.source || '默认';
                    if (!sourceGroups[source]) {
                        sourceGroups[source] = [];
                    }
                    sourceGroups[source].push(ep);
                });

                episodesHtml = Object.keys(sourceGroups).map(sourceName => {
                    const eps = sourceGroups[sourceName];
                    return `
                        <div class="episodes">
                            <h4>📺 ${sourceName} (${eps.length})</h4>
                            <div class="episode-grid">
                                ${eps.map((ep, i) => `
                                    <button class="episode-btn" onclick="playVideo('${ep.url.replace(/'/g, "\\'")}', '${ep.name.replace(/'/g, "\\'")}')">${ep.name}</button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                // 如果没有 episodes，显示一个默认播放按钮
                episodesHtml = `
                    <div class="episodes">
                        <h4>📺 播放</h4>
                        <div class="episode-grid">
                            <button class="episode-btn" onclick="alert('暂无播放链接，数据解析可能有问题，请检查控制台日志')">播放</button>
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 14px;">
                            <strong>提示:</strong> 未找到播放链接，请查看浏览器控制台了解数据详情
                        </div>
                    </div>
                `;
            }

            // 构建详情信息
            let detailsHtml = '';
            if (item.year) detailsHtml += `<div class="detail-row"><span class="detail-label">年份</span><span class="detail-value">${item.year}</span></div>`;
            if (item.type) detailsHtml += `<div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">${item.type}</span></div>`;
            if (item.area) detailsHtml += `<div class="detail-row"><span class="detail-label">地区</span><span class="detail-value">${item.area}</span></div>`;
            if (item.lang) detailsHtml += `<div class="detail-row"><span class="detail-label">语言</span><span class="detail-value">${item.lang}</span></div>`;
            if (item.actor) detailsHtml += `<div class="detail-row"><span class="detail-label">演员</span><span class="detail-value">${item.actor}</span></div>`;
            if (item.director) detailsHtml += `<div class="detail-row"><span class="detail-label">导演</span><span class="detail-value">${item.director}</span></div>`;
            if (item.remarks) detailsHtml += `<div class="detail-row"><span class="detail-label">备注</span><span class="detail-value">${item.remarks}</span></div>`;
            if (item.pubdate) detailsHtml += `<div class="detail-row"><span class="detail-label">首播</span><span class="detail-value">${item.pubdate}</span></div>`;
            detailsHtml += `<div class="detail-row"><span class="detail-label">来源</span><span class="detail-value">${item.sourceName}</span></div>`;

            // 重置收藏状态
            isFavorited = false;
            
            // 检查是否已收藏
            checkFavorite(item.id);
            
            document.getElementById('movieInfo').innerHTML = `
                <div class="movie-info">
                    ${item.pic
                        ? `<img class="movie-poster" src="${item.pic}" alt="${item.title}">`
                        : `<div class="movie-poster" style="display:flex;align-items:center;justify-content:center;font-size:80px;background:#f0f0f0;">🎬</div>`
                    }
                    <div class="movie-details">
                        <h3>${item.title}</h3>
                        ${detailsHtml}
                        <button id="favoriteBtn" class="favorite-btn" onclick="toggleFavorite(allResults[${index}])">
                            🤍 收藏
                        </button>
                    </div>
                </div>
                ${item.desc ? `
                    <div class="movie-desc">
                        <strong>简介</strong>
                        <p>${item.desc}</p>
                    </div>
                ` : ''}
                ${episodesHtml}
            `;

            document.getElementById('modal').classList.add('active');
        }

        let hlsPlayer = null;
        let currentPoster = '';  // 保存当前视频的海报

        function playVideo(url, name) {
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // 先停止之前的播放
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            videoPlayer.pause();
            videoPlayer.src = '';
            
            playerContainer.classList.add('active');
            playerContainer.classList.add('player-loading');
            videoPlayer.poster = currentPoster;  // 设置视频海报
            
            console.log('开始播放:', name, url);
            console.log('使用海报:', currentPoster);
            
            // 判断是否是m3u8
            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    // 使用HLS.js
                    hlsPlayer = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,  // 关闭低延迟模式，提高稳定性
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                        startLevel: 0
                    });
                    
                    hlsPlayer.loadSource(url);
                    hlsPlayer.attachMedia(videoPlayer);
                    
                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                        console.log('HLS 清单解析成功，开始播放');
                        playerContainer.classList.remove('player-loading');
                        videoPlayer.play().catch(e => {
                            console.log('自动播放失败，请手动点击播放');
                        });
                    });
                    
                    hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                        console.error('HLS 错误:', data);
                        
                        if (data.fatal) {
                            playerContainer.classList.remove('player-loading');
                            let errorMsg = '视频加载失败';
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    errorMsg = `网络错误: ${data.details || '加载失败'}\n\nURL: ${url}`;
                                    console.log('尝试恢复网络错误...');
                                    hlsPlayer.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    errorMsg = `媒体错误: ${data.details || '解码失败'}`;
                                    console.log('尝试恢复媒体错误...');
                                    hlsPlayer.recoverMediaError();
                                    break;
                                default:
                                    errorMsg = `未知错误: ${data.details}`;
                                    hlsPlayer.destroy();
                                    hlsPlayer = null;
                                    break;
                            }
                            alert(errorMsg + '\n\n建议尝试其他播放源或稍后再试。');
                        }
                    });
                } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari原生支持
                    console.log('使用Safari原生HLS支持');
                    videoPlayer.src = url;
                    
                    // 添加加载和错误处理
                    videoPlayer.oncanplay = () => {
                        playerContainer.classList.remove('player-loading');
                    };
                    videoPlayer.onerror = () => {
                        playerContainer.classList.remove('player-loading');
                        alert('视频加载失败，请检查网络连接或尝试其他播放源。\n\nURL: ' + url);
                    };
                    
                    videoPlayer.play().catch(e => console.log('自动播放失败'));
                } else {
                    playerContainer.classList.remove('player-loading');
                    alert('您的浏览器不支持HLS视频播放\n\n建议使用Chrome、Firefox或Safari浏览器。');
                }
            } else {
                // 普通视频
                console.log('播放普通视频');
                videoPlayer.src = url;
                
                // 添加加载和错误处理
                videoPlayer.oncanplay = () => {
                    playerContainer.classList.remove('player-loading');
                };
                videoPlayer.onerror = () => {
                    playerContainer.classList.remove('player-loading');
                    alert('视频加载失败: ' + (videoPlayer.error?.message || '未知错误') + '\n\nURL: ' + url);
                };
                
                videoPlayer.play().catch(e => console.log('自动播放失败，请手动点击播放'));
            }
            
            playerContainer.scrollIntoView({ behavior: 'smooth' });
        }

        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // 清理HLS播放器
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            videoPlayer.pause();
            videoPlayer.src = '';
            playerContainer.classList.remove('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            closePlayer();
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });

        // 收藏功能相关
        let isFavorited = false;
        
        async function checkFavorite(vodId) {
            try {
                const response = await fetch(`${API_BASE}/api/favorites/check/${vodId}`);
                const data = await response.json();
                isFavorited = data.isFavorited;
                updateFavoriteBtn();
            } catch (e) {
                console.log('检查收藏状态失败:', e);
            }
        }
        
        async function toggleFavorite(item) {
            try {
                if (isFavorited) {
                    // 取消收藏
                    await fetch(`${API_BASE}/api/favorites/${item.id}`, {
                        method: 'DELETE'
                    });
                    isFavorited = false;
                    alert('已取消收藏');
                } else {
                    // 添加收藏 - 把当前搜索数据转换为收藏格式
                    const favoriteData = {
                        vod_id: item.id,
                        vod_name: item.title,
                        vod_year: item.year,
                        vod_type: item.type,
                        vod_content: item.desc,
                        vod_pic: item.pic,
                        vod_pic_thumb: item.picThumb,
                        vod_pic_slide: item.picSlide,
                        vod_actor: item.actor,
                        vod_director: item.director,
                        vod_remarks: item.remarks,
                        vod_area: item.area,
                        vod_lang: item.lang,
                        vod_pubdate: item.pubdate,
                        vod_play_from: item.playFrom,
                        source_name: item.sourceName,
                        source_id: item.sourceId,
                        episodes: item.episodes
                    };
                    
                    const response = await fetch(`${API_BASE}/api/favorites`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(favoriteData)
                    });
                    
                    if (response.ok) {
                        isFavorited = true;
                        alert('收藏成功！');
                    } else {
                        const data = await response.json();
                        alert(data.error || '收藏失败');
                    }
                }
                updateFavoriteBtn();
            } catch (e) {
                console.error('操作失败:', e);
                alert('操作失败，请稍后再试');
            }
        }
        
        function updateFavoriteBtn() {
            const btn = document.getElementById('favoriteBtn');
            if (btn) {
                btn.classList.toggle('favorited', isFavorited);
                btn.innerHTML = isFavorited ? '❤️ 已收藏' : '🤍 收藏';
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
